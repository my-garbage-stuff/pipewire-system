<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="org.pulseaudio.Server"/>
    <allow own="org.pipewire.PipeWire.0"/>
    <allow own="org.pipewire.Telephony"/>
    <allow own_prefix="org.pipewire"/>
    <allow own_prefix="org.freedesktop.ReserveDevice1"/>
    <allow own_prefix="org.bluez"/>
    <allow own="org.hsphfpd"/>
    <allow own="org.ofono"/>
    <allow send_destination="org.bluez"/>
    <allow receive_sender="org.bluez"/>
  </policy>
  <policy context="default">
    <allow send_destination="org.pulseaudio.Server"/>
    <allow send_destination="org.pipewire.PipeWire.0"/>
    <allow send_destination="org.bluez"/>
  </policy>
</busconfig>
